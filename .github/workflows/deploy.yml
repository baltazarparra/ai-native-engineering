# Deploy static site to GitHub Pages.
#
# Blog (Notion) at build time requires Actions secrets (never commit values):
#   NOTION_TOKEN, NOTION_DATABASE_ID
# See README.md § Blog (Notion) → CI / GitHub Actions and docs-blog/prd-blog/phase8.md.
#
# Policy: missing secrets on push to main → build fails (no silent empty blog).
# Fork workflows do not receive upstream secrets; use local .env for blog development.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build and upload Pages artifact
        uses: withastro/action@v6
        with:
          node-version: 22
          package-manager: pnpm
          build-cmd: pnpm run build

  deploy:
    name: Deploy site
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v5
